lab_name: "XSS Lab"
description: "Test reflected, stored, and DOM XSS against HackLabs vulnerable endpoints"
base_url: "http://localhost:5000"
wstg_categories: [WSTG-INPV-02]
endpoints:
  - path: "/xss/reflected"
    params: [name]
    method: GET
  - path: "/xss/stored"
    params: [author, body]
    method: POST
  - path: "/xss/dom"
    params: [input]
    method: GET
expected_behaviors:
  - "Reflected input renders without HTML encoding"
  - "Stored comments render script tags in browser"
  - "DOM input executes JavaScript via innerHTML"
